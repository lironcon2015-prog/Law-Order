  top: 10px; bottom: 10px;
  width: 2px;
  border-radius: var(--radius-pill);
  background: var(--gold-grad);
}

/* ---------- empty state: ריחוף איטי ---------- */
.empty__icon { animation: floatY 6s ease-in-out infinite; }
@keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

/* ---------- tier לקוח: טבעת זהב מסתובבת (conic) ---------- */
@property --ring-angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
.avatar[data-tier="5"]:not(.has-photo), .detail__avatar[data-tier="5"]:not(.has-photo) {
  background:
    radial-gradient(circle at 32% 26%, #2b2b33, #131318) padding-box,
    conic-gradient(from var(--ring-angle),
      #c6982f, #ffe7a8 25%, #f2ca50 50%, #8a6a24 75%, #c6982f) border-box;
  animation: ringSpin 5s linear infinite;
}
@keyframes ringSpin { to { --ring-angle: 360deg; } }

/* ---------- pipeline: scroll-snap בגלילה אופקית ---------- */
.board { scroll-snap-type: x proximity; scroll-padding-inline: 24px; }
.lane { scroll-snap-align: start; }

/* ---------- reduced motion: כיבוי לולאות אינסופיות ---------- */
@media (prefers-reduced-motion: reduce) {
  .sb-logo::after,
  .avatar[data-tier="5"], .detail__avatar[data-tier="5"],
  .empty__icon { animation: none !important; }
}

/* ============================================================
   v4 — Editorial Luxury: serif display · עומק · מיקרו-אנימציות
   ============================================================ */

/* ---------- טיפוגרפיה: serif עברי לכותרות (Frank Ruhl Libre) ---------- */
:root { --font-display: 'Frank Ruhl Libre', 'Assistant', Georgia, serif; }
.sb-brand-name {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.005em;
}
.detail__name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 2.05rem;
  letter-spacing: 0;
}
.modal__head h2, .empty h2 { font-family: var(--font-display); font-weight: 700; }
.lane__name { font-family: var(--font-display); font-weight: 700; font-size: 0.98rem; }
/* מספרי display — ספרות serif אלגנטיות (סגנון private-bank) */
.stat-card__num, .followup__num { font-family: var(--font-display); font-weight: 650; }

/* ---------- רקע: קרן אור זהב איטית (aurora beam) ---------- */
.bg-glow::after {
  content: "";
  position: absolute;
  inset: -22%;
  background: conic-gradient(from 0deg at 68% 18%,
    transparent 0 76%, rgba(242, 202, 80, 0.05) 86%, transparent 95%);
  animation: beamSpin 70s linear infinite;
}
@keyframes beamSpin { to { transform: rotate(360deg); } }

/* ---------- kv: שורות עם hairline (מסמך משפטי) ---------- */
.kv { row-gap: 0; }
.kv dt, .kv dd { padding-block: 9px; border-bottom: 1px solid var(--line-soft); }
.kv dt:last-of-type, .kv dd:last-of-type { border-bottom: 0; }

/* ---------- כפתורים: ghost נוטה לזהב ---------- */
.btn--ghost:hover {
  border-color: var(--gold-line);
  color: var(--gold-bright);
  background: var(--gold-softer);
}
.chan-btn:hover { background: var(--gold-softer); }
.sync-menu__item:hover svg { color: var(--gold-bright); }

/* ---------- meter: shimmer חי על המילוי ---------- */
.meter__fill { position: relative; overflow: hidden; }
.meter__fill::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.30), transparent);
  transform: translateX(-110%);
  animation: meterSheen 2.8s ease-in-out infinite;
}
@keyframes meterSheen { 55%, 100% { transform: translateX(110%); } }

/* ---------- דחיפות: פעימה שקטה ---------- */
.prio--overdue .dot, .badge-overdue svg { animation: pulseDot 1.7s ease-in-out infinite; }
@keyframes pulseDot { 50% { opacity: 0.4; } }

/* ---------- modal: כניסה עם blur + פוטר זכוכית ---------- */
dialog.modal[open] { animation: modalInLux 0.42s var(--ease-out); }
@keyframes modalInLux {
  from { opacity: 0; transform: translateY(18px) scale(0.965); filter: blur(8px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
.modal__foot {
  background: rgba(0, 0, 0, 0.28);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* ---------- detail: כניסת פאנלים מדורגת (list + drawer) ---------- */
.detail__panels .panel, .drawer__body .panel { animation: riseIn 0.42s var(--ease-out) backwards; }
:is(.detail__panels, .drawer__body .detail__panels) .panel:nth-of-type(1) { animation-delay: 0.04s; }
:is(.detail__panels, .drawer__body .detail__panels) .panel:nth-of-type(2) { animation-delay: 0.09s; }
:is(.detail__panels, .drawer__body .detail__panels) .panel:nth-of-type(3) { animation-delay: 0.14s; }
:is(.detail__panels, .drawer__body .detail__panels) .panel:nth-of-type(n+4) { animation-delay: 0.18s; }

/* ---------- deals: סכום מוזהב ב-hover ---------- */
table.deals tbody tr:hover td.amount { color: var(--gold-bright); }
.note { transition: border-color var(--t-fast); }
.note:hover { border-color: var(--line); }

/* ---------- FAB: טבעת פעימה + safe-area ---------- */
.fab { inset-block-end: calc(22px + env(safe-area-inset-bottom, 0px)); }
.fab::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  animation: fabPulse 3.4s var(--ease-out) infinite;
}
@keyframes fabPulse {
  0%        { box-shadow: 0 0 0 0 rgba(242, 202, 80, 0.38); }
  60%, 100% { box-shadow: 0 0 0 18px rgba(242, 202, 80, 0); }
}

/* ---------- search: מתרחב בפוקוס ---------- */
.search { transition: max-width 0.45s var(--ease-out); }
.search:focus-within { max-width: 640px; }

/* ---------- view transitions: cross-fade בין מסכים ---------- */
::view-transition-old(root), ::view-transition-new(root) {
  animation-duration: 0.26s;
  animation-timing-function: var(--ease-out);
}

/* ---------- responsive: kv במובייל בלי קו כפול ---------- */
@media (max-width: 768px) {
  .kv dt { border-bottom: 0; padding-bottom: 0; }
  .detail__name { font-size: 1.65rem; }
}

/* ---------- תיקון grid blowout: הרשימה במובייל רחבה מה-viewport (באג קיים ב-main) ---------- */
@media (max-width: 768px) {
  .workspace { grid-template-columns: minmax(0, 1fr); }
  .sidebar, .main { min-width: 0; }
}
/* ---------- reduced motion (v4) ---------- */
@media (prefers-reduced-motion: reduce) {
  .bg-glow::after, .meter__fill::after,
  .prio--overdue .dot, .badge-overdue svg,
  .fab::after { animation: none !important; }
}

  <script src="https://accounts.google.com/gsi/client" async></script>

  <!-- שכבות עומק/טקסטורה — אובסידיאן -->
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sb">
      <div class="sb-brand">
        <span class="sb-logo" data-icon="scale" aria-hidden="true"></span>
        <span class="sb-brand-text">
          <span class="sb-brand-name">LexLedger</span>
          <span class="sb-brand-sub">ניהול עסקי לעו"ד</span>
        </span>
      </div>

      <div class="sb-section-label">סקירה</div>
      <button id="view-today" class="sb-item" role="tab" aria-selected="true" type="button">
        <span class="ic" data-icon="zap" aria-hidden="true"></span> דשבורד
      </button>

      <div class="sb-section-label">פיתוח עסקי</div>
      <button id="view-pipeline" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="kanban" aria-hidden="true"></span> צינור לידים
      </button>
      <button id="view-network" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="network" aria-hidden="true"></span> רשת
      </button>
      <button id="view-list" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="users" aria-hidden="true"></span> אנשי קשר
      </button>

      <div class="sb-section-label">כספים</div>
      <button id="view-clients" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="folder" aria-hidden="true"></span> לקוחות ותיקים
      </button>
      <button id="view-invoices" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="receipt" aria-hidden="true"></span> חשבוניות
      </button>
      <button id="view-payments" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="wallet" aria-hidden="true"></span> תשלומים
      </button>
      <button id="view-analysis" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="trending" aria-hidden="true"></span> אנליזה
      </button>
      <button id="view-fin-settings" class="sb-item" role="tab" aria-selected="false" type="button">
        <span class="ic" data-icon="settings" aria-hidden="true"></span> הגדרות
      </button>
    </aside>

    <!-- Content -->
    <div class="content">
      <div class="topbar">
        <button id="nav-toggle" class="btn btn--icon btn--ghost hide-wide" type="button" aria-label="תפריט">
          <span data-icon="list" aria-hidden="true"></span>
        </button>
        <div class="search">
          <span class="search__icon" data-icon="search" aria-hidden="true"></span>
          <input id="search-input" class="search__input" type="search"
                 placeholder="חיפוש שם, חברה, משקיע, תגית…" autocomplete="off" aria-label="חיפוש" />
        </div>
        <button id="sync-btn" class="sync-status" type="button" data-state="off" title="סנכרון" aria-label="סנכרון Drive">
          <span class="ic" data-icon="cloud" aria-hidden="true"></span>
        </button>
        <button id="btn-add-company" class="btn btn--ghost btn--sm" type="button" title="חברה חדשה">
          <span data-icon="building" aria-hidden="true"></span>
          <span class="hide-narrow">חברה</span>
        </button>
        <button id="btn-add" class="btn btn--primary btn--sm" type="button">
          <span data-icon="plus" aria-hidden="true"></span>
          <span class="hide-narrow">איש קשר</span>
        </button>
      </div>

      <!-- "היום" — דשבורד/מנוע פעולה -->
      <section id="today-view" class="screen-wrap" aria-label="דשבורד"></section>
      <!-- רשת -->
      <section id="network-view" class="screen-wrap" aria-label="רשת"></section>
      <!-- Pipeline -->
      <section id="board" class="board" aria-label="צינור לידים"></section>

      <!-- כספים -->
      <section id="clients-view" class="screen-wrap fin-screen" aria-label="לקוחות ותיקים"></section>
      <section id="invoices-view" class="screen-wrap fin-screen" aria-label="חשבוניות"></section>
      <section id="payments-view" class="screen-wrap fin-screen" aria-label="תשלומים"></section>
      <section id="analysis-view" class="screen-wrap fin-screen" aria-label="אנליזה"></section>
      <section id="fin-settings-view" class="screen-wrap fin-screen" aria-label="הגדרות כספים"></section>

      <!-- Workspace (אנשי קשר) -->
      <div class="workspace">
        <aside class="sidebar">
          <div class="sidebar__top">
            <div class="segmented" role="tablist" aria-label="תצוגת רשימה">
              <button id="seg-all" class="segmented__btn" role="tab" aria-selected="true" type="button">
                כל אנשי הקשר <span class="count">0</span>
              </button>
              <button id="seg-followup" class="segmented__btn" role="tab" aria-selected="false" type="button">
                למעקב <span class="count">0</span>
              </button>
            </div>
            <div id="chips" class="chips" role="group" aria-label="סינון לפי שלב במשפך"></div>
          </div>
          <div id="list" class="list" role="list" aria-label="אנשי קשר"></div>
        </aside>
        <main id="main" class="main" aria-live="polite"></main>
      </div>
    </div>
  </div>

  <!-- FAB (mobile) -->
  <button id="fab" class="fab" type="button" aria-label="הוספת איש קשר">
    <span data-icon="plus" aria-hidden="true"></span>
  </button>

  <!-- Detail drawer -->
  <div id="drawer" class="drawer" hidden>
    <div class="drawer__scrim" data-action="close-drawer" aria-hidden="true"></div>
    <aside class="drawer__panel" role="dialog" aria-label="פרטי איש קשר">
      <button class="drawer__close" type="button" data-action="close-drawer" aria-label="סגירה">
        <span data-icon="close" aria-hidden="true"></span>
      </button>
      <div id="drawer-body" class="drawer__body"></div>
    </aside>
  </div>
